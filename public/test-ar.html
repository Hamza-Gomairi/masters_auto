<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار توليد PDF (AR)</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #0f4c81;
      --primary-dark: #0b355a;
      --border: #d0d5dd;
      --background: #f5f7fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --danger: #b42318;
      --success: #067647;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(16, 24, 40, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 24px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(18px, 3.2vw, 28px);
    }

    .hero p {
      margin: 0;
      opacity: 0.92;
      line-height: 1.5;
      font-size: 14px;
    }

    form { padding: 24px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      background: #ffffff;
    }

    input:focus {
      outline: 3px solid rgba(15, 76, 129, 0.16);
      border-color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-start;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.45;
    }

    .message.error {
      display: block;
      color: var(--danger);
      background: #fef3f2;
      border: 1px solid #fecdca;
    }

    .message.success {
      display: block;
      color: var(--success);
      background: #ecfdf3;
      border: 1px solid #abefc6;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .hero, form { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="hero">
        <h1>صفحة اختبار توليد PDF (عربي)</h1>
        <p>بدون التحقق من 3 فصول. أدخل المعطيات ثم حمّل ملف PDF مباشرة.</p>
      </header>

      <form id="testForm">
        <div class="grid">
          <div class="field">
            <label for="nom">النسب *</label>
            <input id="nom" name="nom" type="text" required>
          </div>

          <div class="field">
            <label for="prenom">الاسم *</label>
            <input id="prenom" name="prenom" type="text" required>
          </div>

          <div class="field">
            <label for="cne">رقم التسجيل (CNE) *</label>
            <input id="cne" name="cne" type="text" required>
          </div>

          <div class="field">
            <label for="telephone">رقم الهاتف *</label>
            <input id="telephone" name="telephone" type="tel" required>
          </div>

          <div class="field full">
            <label for="email">البريد الإلكتروني</label>
            <input id="email" name="email" type="email" placeholder="exemple@etu.uae.ac.ma">
          </div>

          <div class="field full">
            <label for="master">اسم الماستر *</label>
            <input id="master" name="master" type="text" required>
          </div>

          <div class="field full">
            <label for="professeur">الأستاذ المسؤول *</label>
            <input id="professeur" name="professeur" type="text" required>
          </div>

          <div class="field full">
            <label for="theme">موضوع مذكرة الماستر *</label>
            <input id="theme" name="theme" type="text" required>
          </div>
        </div>

        <div class="actions">
          <button id="submitButton" type="submit">تحميل PDF</button>
          <span class="hint">سيتم تنزيل ملف PDF مباشرة بعد الإرسال.</span>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('testForm');
    const message = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function clearMessage() {
      message.textContent = '';
      message.className = 'message';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const payload = Object.fromEntries(new FormData(form).entries());
      payload.lang = 'ar';
      payload.cne = String(payload.cne || '').trim().toUpperCase();
      document.getElementById('cne').value = payload.cne;

      submitButton.disabled = true;
      submitButton.textContent = '...جاري التحميل';

      try {
        const response = await fetch('/api/test-generate-ar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          showMessage(error.message || 'فشل إنشاء ملف PDF.', 'error');
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `proposition-jury-${payload.cne}.pdf`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showMessage('تم إنشاء ملف PDF وتنزيله بنجاح.', 'success');
      } catch (e) {
        showMessage('تعذر الاتصال بالخادم.', 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'تحميل PDF';
      }
    });
  </script>
</body>
</html>
