<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposition de membres de Jury - FSJES Tanger v1.7.1</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #0f4c81;
      --primary-dark: #0b355a;
      --danger: #b42318;
      --success: #067647;
      --border: #d0d5dd;
      --background: #f5f7fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(16, 24, 40, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 28px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      position: relative;
    }

    .lang-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      display: inline-flex;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
    }

    .lang-toggle button {
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }

    .lang-toggle button.active {
      background: rgba(255, 255, 255, 0.22);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
    }

    .hero p {
      margin: 0;
      opacity: 0.92;
      line-height: 1.5;
    }

    form {
      padding: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      background: #ffffff;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(15, 76, 129, 0.16);
      border-color: var(--primary);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #ffffff;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      line-height: 1.45;
    }

    .message.error {
      display: block;
      color: var(--danger);
      background: #fef3f2;
      border: 1px solid #fecdca;
    }

    .message.success {
      display: block;
      color: var(--success);
      background: #ecfdf3;
      border: 1px solid #abefc6;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero,
      form {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="hero">
        <div class="lang-toggle" aria-label="Choix de langue">
          <button type="button" id="langFr" class="active" aria-pressed="true">FR</button>
          <button type="button" id="langAr" aria-pressed="false">العربية</button>
        </div>

        <h1 id="pageTitle">Proposition de membres de Jury</h1>
        <p id="pageSubtitle">FSJES Tanger v1.7.1 — génération automatique du formulaire officiel après vérification de l'éligibilité académique.</p>
      </header>

      <form id="juryForm">
        <input id="lang" name="lang" type="hidden" value="fr">
        <div class="grid">
          <div class="field">
            <label for="nom" id="labelNom">Nom *</label>
            <input id="nom" name="nom" type="text" autocomplete="family-name" required>
          </div>

          <div class="field">
            <label for="prenom" id="labelPrenom">Prénom *</label>
            <input id="prenom" name="prenom" type="text" autocomplete="given-name" required>
          </div>

          <div class="field">
            <label for="cne" id="labelCne">CNE *</label>
            <input id="cne" name="cne" type="text" required>
          </div>

          <div class="field">
            <label for="telephone" id="labelTelephone">N° de téléphone *</label>
            <input id="telephone" name="telephone" type="tel" autocomplete="tel" required>
          </div>

          <div class="field full">
            <label for="email" id="labelEmail">Email institutionnel</label>
            <input id="email" name="email" type="email" placeholder="exemple@etu.uae.ac.ma" autocomplete="email">
          </div>

          <div class="field full">
            <label for="master" id="labelMaster">Nom du Master *</label>
            <select id="master" name="master" required>
              <option value="">Chargement des masters...</option>
            </select>
          </div>

          <div class="field full">
            <label for="professeur" id="labelProfesseur">Professeur responsable *</label>
            <input id="professeur" name="professeur" type="text" required>
          </div>

          <div class="field full">
            <label for="theme" id="labelTheme">Mémoire du Master sous le thème *</label>
            <input id="theme" name="theme" type="text" required>
          </div>
        </div>

        <div class="actions">
          <button id="submitButton" type="submit">Valider et télécharger le PDF</button>
          <span class="hint" id="downloadHint">Le PDF est téléchargé immédiatement si l'étudiant est éligible.</span>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('juryForm');
    const message = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');
    const masterSelect = document.getElementById('master');
    const langInput = document.getElementById('lang');
    const langFr = document.getElementById('langFr');
    const langAr = document.getElementById('langAr');

    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const downloadHint = document.getElementById('downloadHint');

    const labelNom = document.getElementById('labelNom');
    const labelPrenom = document.getElementById('labelPrenom');
    const labelCne = document.getElementById('labelCne');
    const labelTelephone = document.getElementById('labelTelephone');
    const labelEmail = document.getElementById('labelEmail');
    const labelMaster = document.getElementById('labelMaster');
    const labelProfesseur = document.getElementById('labelProfesseur');
    const labelTheme = document.getElementById('labelTheme');

    loadMasters();

    langFr.addEventListener('click', () => setLanguage('fr'));
    langAr.addEventListener('click', () => setLanguage('ar'));

    setLanguage(langInput.value || 'fr');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const payload = Object.fromEntries(new FormData(form).entries());
      submitButton.disabled = true;
      submitButton.textContent = 'Validation en cours...';

      try {
        const response = await fetch('/api/validate-and-generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          const text = error.message || (Array.isArray(error.errors) ? error.errors.join(' ') : 'La génération du PDF a échoué.');
          showMessage(text, 'error');
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `proposition-jury-${payload.cne}.pdf`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showMessage(getUiText('success_download'), 'success');
      } catch (error) {
        showMessage(getUiText('error_contact'), 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = getUiText('submit');
      }
    });

    async function loadMasters() {
      try {
        const response = await fetch('/api/masters');
        const data = await response.json();
        masterSelect.innerHTML = '<option value="">Sélectionner un Master</option>';

        data.masters.forEach((master) => {
          const option = document.createElement('option');
          option.value = master;
          option.textContent = master;
          masterSelect.appendChild(option);
        });
      } catch (error) {
        masterSelect.innerHTML = '<option value="">Erreur de chargement des masters</option>';
      }
    }

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function setLanguage(lang) {
      const normalized = lang === 'ar' ? 'ar' : 'fr';
      langInput.value = normalized;

      langFr.classList.toggle('active', normalized === 'fr');
      langAr.classList.toggle('active', normalized === 'ar');
      langFr.setAttribute('aria-pressed', String(normalized === 'fr'));
      langAr.setAttribute('aria-pressed', String(normalized === 'ar'));

      document.documentElement.lang = normalized;
      document.documentElement.dir = normalized === 'ar' ? 'rtl' : 'ltr';

      pageTitle.textContent = getUiText('title', normalized);
      pageSubtitle.textContent = getUiText('subtitle', normalized);
      downloadHint.textContent = getUiText('download_hint', normalized);

      labelNom.textContent = getUiText('label_nom', normalized);
      labelPrenom.textContent = getUiText('label_prenom', normalized);
      labelCne.textContent = getUiText('label_cne', normalized);
      labelTelephone.textContent = getUiText('label_tel', normalized);
      labelEmail.textContent = getUiText('label_email', normalized);
      labelMaster.textContent = getUiText('label_master', normalized);
      labelProfesseur.textContent = getUiText('label_prof', normalized);
      labelTheme.textContent = getUiText('label_theme', normalized);
      submitButton.textContent = getUiText('submit', normalized);

      clearMessage();
    }

    function getUiText(key, lang) {
      const normalized = lang === 'ar' ? 'ar' : 'fr';
      const dict = {
        fr: {
          title: 'Proposition de membres de Jury',
          subtitle: "FSJES Tanger v1.7.1 — génération automatique du formulaire officiel après vérification de l'éligibilité académique.",
          download_hint: "Le PDF est téléchargé immédiatement si l'étudiant est éligible.",
          label_nom: 'Nom *',
          label_prenom: 'Prénom *',
          label_cne: 'CNE *',
          label_tel: 'N° de téléphone *',
          label_email: 'Email institutionnel',
          label_master: 'Nom du Master *',
          label_prof: 'Professeur responsable *',
          label_theme: 'Mémoire du Master sous le thème *',
          submit: 'Valider et télécharger le PDF',
          success_download: 'PDF généré et téléchargé avec succès.',
          error_contact: 'Impossible de contacter le serveur. Vérifiez que le backend est lancé.'
        },
        ar: {
          title: 'اقتراح تعيين أعضاء لجنة المناقشة',
          subtitle: 'كلية العلوم القانونية والاقتصادية والاجتماعية بطنجة v1.7.1 — إنشاء تلقائي للاستمارة الرسمية بعد التحقق من الأهلية الدراسية.',
          download_hint: 'يتم تنزيل ملف PDF مباشرة إذا كان الطالب مؤهلاً.',
          label_nom: 'النسب *',
          label_prenom: 'الاسم *',
          label_cne: 'رقم التسجيل (CNE) *',
          label_tel: 'رقم الهاتف *',
          label_email: 'البريد الإلكتروني الجامعي',
          label_master: 'اسم الماستر *',
          label_prof: 'الأستاذ المسؤول *',
          label_theme: 'موضوع مذكرة الماستر *',
          submit: 'تحقق وتحميل PDF',
          success_download: 'تم إنشاء ملف PDF وتنزيله بنجاح.',
          error_contact: 'تعذر الاتصال بالخادم. تأكد من تشغيل الخادم الخلفي.'
        }
      };

      return dict[normalized][key] || dict.fr[key] || '';
    }

    function clearMessage() {
      message.textContent = '';
      message.className = 'message';
    }
  </script>
</body>
</html>
